services:
  - type: web
    name: teaching-english-review
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: ALLOWED_EMAIL_DOMAINS
        sync: false
      - key: LOCKED_LESSONS
        sync: false
      - key: SESSION_HOURS
        value: "24"
