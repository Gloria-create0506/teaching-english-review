services:
  - type: web
    name: teaching-english-review
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: ALLOWED_EMAIL_DOMAINS
        sync: false
      - key: SESSION_HOURS
        value: "24"
      - key: VERIFY_TOKEN_HOURS
        value: "24"
      - key: RESET_TOKEN_MINUTES
        value: "30"
