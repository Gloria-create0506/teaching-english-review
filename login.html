<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>进入复习课</title>
  <style>
    :root {
      --ink: #22304a;
      --muted: #61708a;
      --sky: #3186d9;
      --leaf: #2f9a70;
      --sun: #f3b332;
      --paper: #fff8e7;
      --card: rgba(255, 255, 255, 0.92);
      --line: rgba(66, 91, 130, 0.16);
      --shadow: 0 24px 70px rgba(34, 48, 74, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 36px;
      color: var(--ink);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 14% 16%, rgba(243, 179, 50, 0.28), transparent 30%),
        radial-gradient(circle at 82% 22%, rgba(49, 134, 217, 0.25), transparent 34%),
        linear-gradient(135deg, #fff8e7 0%, #e7f5ff 48%, #f1fff6 100%);
    }

    .login-card {
      width: min(880px, 100%);
      display: grid;
      grid-template-columns: 1fr 1.15fr;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 32px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .visual {
      position: relative;
      min-height: 520px;
      display: grid;
      place-items: center;
      padding: 36px;
      background:
        linear-gradient(160deg, rgba(49, 134, 217, 0.15), rgba(47, 154, 112, 0.12)),
        #ffffff;
    }

    .visual::before {
      content: "";
      position: absolute;
      inset: 34px;
      border-radius: 28px;
      border: 2px dashed rgba(49, 134, 217, 0.24);
    }

    .monkey {
      position: relative;
      z-index: 1;
      width: 230px;
      height: 230px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: radial-gradient(circle at 45% 34%, #fff1ba 0 16%, #f3b332 17% 42%, #b86e2c 43% 100%);
      box-shadow: 0 18px 50px rgba(184, 110, 44, 0.28);
      font-size: 6rem;
    }

    .monkey::after {
      content: "🐒";
      transform: translateY(4px);
    }

    .visual-note {
      position: absolute;
      left: 42px;
      right: 42px;
      bottom: 42px;
      z-index: 1;
      padding: 18px 20px;
      border-radius: 22px;
      color: #694309;
      background: rgba(255, 241, 186, 0.9);
      border: 1px solid rgba(243, 179, 50, 0.42);
      font-size: 1.05rem;
      font-weight: 800;
      line-height: 1.45;
    }

    .content {
      padding: 56px 54px;
      display: grid;
      align-content: center;
      gap: 24px;
    }

    .eyebrow {
      width: fit-content;
      padding: 8px 14px;
      border-radius: 999px;
      color: #0d5f8f;
      background: #e4f4ff;
      font-size: 0.95rem;
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 5vw, 4.2rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.16rem;
      line-height: 1.65;
    }

    form {
      display: grid;
      gap: 16px;
      margin-top: 6px;
    }

    label {
      font-size: 1.08rem;
      font-weight: 900;
    }

    input {
      width: 100%;
      min-height: 66px;
      padding: 0 20px;
      border: 2px solid rgba(49, 134, 217, 0.24);
      border-radius: 18px;
      color: var(--ink);
      background: #fff;
      font-size: 1.25rem;
      outline: none;
    }

    input:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 5px rgba(49, 134, 217, 0.12);
    }

    button {
      min-height: 66px;
      border: 0;
      border-radius: 18px;
      color: #fff;
      background: linear-gradient(135deg, var(--sky), var(--leaf));
      box-shadow: 0 14px 26px rgba(49, 134, 217, 0.24);
      font-size: 1.24rem;
      font-weight: 900;
      cursor: pointer;
    }

    .message {
      min-height: 32px;
      color: #b42318;
      font-size: 1.04rem;
      font-weight: 900;
    }

    .tip {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      color: #42604c;
      font-size: 1rem;
      line-height: 1.5;
    }

    .tip strong {
      color: var(--leaf);
    }

    @media (max-width: 760px) {
      body {
        padding: 18px;
      }

      .login-card {
        grid-template-columns: 1fr;
      }

      .visual {
        min-height: 260px;
      }

      .monkey {
        width: 150px;
        height: 150px;
        font-size: 4rem;
      }

      .visual-note {
        position: relative;
        left: auto;
        right: auto;
        bottom: auto;
        margin-top: 18px;
      }

      .content {
        padding: 34px 26px;
      }
    }
  </style>
</head>
<body>
  <main class="login-card" aria-labelledby="pageTitle">
    <section class="visual" aria-hidden="true">
      <div class="monkey"></div>
      <div class="visual-note">Journey to the West · Chapter 1<br>Words, Phrases and Story Power</div>
    </section>
    <section class="content">
      <span class="eyebrow">课堂专用入口</span>
      <h1 id="pageTitle">请输入密码</h1>
      <p>这份复习网页只开放给指定上课对象。同一个密码最多绑定两个 IP，适合老师电脑和学生设备同时使用。</p>
      <form method="post" action="/login">
        <label for="password">Access Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" autofocus required>
        <button type="submit">进入复习课</button>
        <div class="message" role="status">{{MESSAGE}}</div>
      </form>
      <div class="tip"><strong>Tip</strong><span>如果更换设备或网络，请老师重置登录记录后再进入。</span></div>
    </section>
  </main>
  <script>
    (function () {
      var staticPassword = "monkey2026";
      var form = document.querySelector("form");
      var passwordInput = document.getElementById("password");
      var message = document.querySelector(".message");
      var serverMode = "{{SERVER_MODE}}" === "1";
      if (message && message.textContent.indexOf("{{MESSAGE}}") !== -1) {
        message.textContent = "";
      }
      if (!form || serverMode) return;
      if (message && !message.textContent.trim()) {
        message.textContent = "本地或静态网页打开时，默认密码是 monkey2026。";
      }
      form.addEventListener("submit", function (event) {
        event.preventDefault();
        if (passwordInput.value === staticPassword) {
          sessionStorage.setItem("teachingEnglishLoggedIn", "yes");
          sessionStorage.setItem("teachingEnglishStaticMode", "yes");
          location.href = "chapters.html";
          return;
        }
        if (message) {
          message.textContent = "密码不正确，请输入 monkey2026。";
        }
        passwordInput.focus();
        passwordInput.select();
      });
    })();
  </script>
</body>
</html>
